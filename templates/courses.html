{% extends '_layout.html' %}

{% block title %}Курсы{% endblock %}

{% block content %}
    {% for c in courses %}
    <article>
        <h3>
            <a href="{% url 'course_detail' c.id %}">{{ c.code }} {{ c.title }}</a>
        </h3>

        <p>Длительность: {{ c.duration }} ак.ч.</p>
    </article>
    {% empty %}
    <p>Вы пока не зачислены на курсы...</p>
    {% endfor %}
{% endblock %}
