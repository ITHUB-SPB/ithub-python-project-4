<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>noLXP</title>
</head>
<body>
    {% if messages %}
        <div>
        {% for m in messages %}
            <p>{{ m }}</p>
        {% endfor %}
        </div>
    {% endif %}

    {% if request.user.is_authenticated %}
    <nav>
        <a href="{% url 'index' %}">Главная</a>
        <span>{{ request.user.username }}</span>
        <a href="{% url 'logout' %}">Выйти</a>
    </nav>
    {% endif %}

    <h2>{% block title %} {% endblock %}</h2>

    <main>
    {% block content %} {% endblock %}
    </main>
</body>
</html>
